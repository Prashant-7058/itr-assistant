<!DOCTYPE html>
<html>
<head>
<title>AI ITR Assistant</title>

<style>

/* ===== GLOBAL ===== */
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter,Arial;
background:linear-gradient(120deg,#eef2ff,#f8fafc);
}

.main{
padding:40px 60px;
}

/* ===== HERO SECTION ===== */
.hero{
display:flex;
justify-content:space-between;
align-items:stretch;
gap:30px;
background:linear-gradient(135deg,#2563eb,#6366f1);
color:white;
padding:30px;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
height:480px;
overflow:hidden;
}

.hero-left{
max-width:420px;
}

.hero-left h1{
margin:0;
font-size:30px;
}

.hero-left p{
margin-top:10px;
opacity:.9;
font-size:15px;
}

/* ===== CHAT PANEL ===== */
.hero-ai{
width:380px;
background:white;
border-radius:18px;
box-shadow:0 20px 35px rgba(0,0,0,0.25);
display:flex;
flex-direction:column;
height:100%;
overflow:hidden;
}

/* Header */
.chat-header{
background:#1e293b;
color:white;
padding:14px 16px;
font-weight:600;
font-size:15px;
}

/* Messages */
.chat-messages{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
background:#f8fafc;
scroll-behavior:smooth;
}

/* Scrollbar */
.chat-messages::-webkit-scrollbar{
width:6px;
}

.chat-messages::-webkit-scrollbar-thumb{
background:#cbd5e1;
border-radius:6px;
}

/* Bubble */
.msg{
max-width:80%;
padding:10px 14px;
border-radius:14px;
font-size:14px;
line-height:1.5;
animation:fadeIn 0.2s ease-in;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(5px);}
to{opacity:1; transform:translateY(0);}
}

/* User */
.msg.user{
align-self:flex-end;
background:#2563eb;
color:white;
border-bottom-right-radius:4px;
}

/* AI */
.msg.ai{
align-self:flex-start;
background:#e2e8f0;
color:#111827;
border-bottom-left-radius:4px;
}

/* Input */
.hero-ai input{
border:none;
padding:14px;
border-top:1px solid #e5e7eb;
outline:none;
font-size:14px;
background:white;
position:sticky;
bottom:0;
}

/* ===== CARDS ===== */
.grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:26px;
border-radius:16px;
cursor:pointer;
transition:.25s;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
border:1px solid #f1f5f9;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 35px rgba(37,99,235,0.25);
}

.card h2{
margin:0;
color:#2563eb;
}

.card p{
margin-top:8px;
font-size:14px;
color:#555;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
.hero{
flex-direction:column;
height:auto;
}
.hero-ai{
width:100%;
height:400px;
}
.main{
padding:20px;
}
}

</style>
</head>

<body>

<div class="main">

<div class="hero">

<div class="hero-left">
<h1>Select Your Income Tax Return</h1>
<p>AI will guide you based on your income profile. Just describe your income.</p>
</div>

<div class="hero-ai">
<div class="chat-header">AI Tax Assistant</div>
<div id="msgs" class="chat-messages"></div>
<input id="chatInput"
placeholder="Describe your income..."
onkeypress="if(event.key==='Enter')sendMsg()">
</div>

</div>

<div class="grid">
<div class="card" onclick="openITR('ITR1')">
<h2>ITR-1</h2>
<p>Salaried individuals</p>
</div>

<div class="card" onclick="openITR('ITR2')">
<h2>ITR-2</h2>
<p>Salaried + capital gains + property</p>
</div>

<div class="card" onclick="openITR('ITR3')">
<h2>ITR-3</h2>
<p>Business / professional income</p>
</div>

<div class="card" onclick="openITR('ITR4')">
<h2>ITR-4</h2>
<p>Presumptive taxation (44AD / 44ADA)</p>
</div>
</div>

</div>

<script src="/static/shared.js"></script>

<script>

function openITR(type){
if(type==="ITR1") location.href="/static/ITR1.html";
if(type==="ITR2") location.href="/static/ITR2.html";
if(type==="ITR3") location.href="/static/ITR3.html";
if(type==="ITR4") location.href="/static/ITR4.html";
}

function addUserMessage(text){
const div = document.createElement("div");
div.className = "msg user";
div.innerText = text;
msgs.appendChild(div);
msgs.scrollTo({top:msgs.scrollHeight,behavior:"smooth"});
}

function addAIMessage(text){
const div = document.createElement("div");
div.className = "msg ai";
div.innerText = text;
msgs.appendChild(div);
msgs.scrollTo({top:msgs.scrollHeight,behavior:"smooth"});
}

window.addEventListener("load",()=>{
addAIMessage(`Hi 👋 I will help you choose the correct ITR.

What type of income do you have?
• Salary
• Business
• Capital Gains
• Freelance / Presumptive`);
});

async function sendMsg(){
const text = chatInput.value.trim();
if(!text) return;

chatInput.value="";
addUserMessage(text);

try{
const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
field_key:"itrSelector",
message:text
})
});

const data = await res.json();
addAIMessage(data.reply);

if(data.fillValue){
setTimeout(()=>{
if(data.fillValue==="ITR-1") location.href="/static/ITR1.html";
if(data.fillValue==="ITR-2") location.href="/static/ITR2.html";
if(data.fillValue==="ITR-3") location.href="/static/ITR3.html";
if(data.fillValue==="ITR-4") location.href="/static/ITR4.html";
},1000);
}

}catch{
addAIMessage("AI connection error");
}
}

</script>

</body>
</html>
